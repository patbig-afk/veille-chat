<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veille Techno — Second Cerveau</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #3b82f6;
      --accent-dim: #1d3a6e;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --user-bg: #1e3a5f;
      --ai-bg: #1a1d27;
      --source-bg: #12151e;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      flex-shrink: 0;
    }

    .dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    header span {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: 4px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 780px;
      width: 100%;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.65;
      max-width: 100%;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bg);
      border-bottom-right-radius: 4px;
      color: #bfdbfe;
    }

    .message.assistant .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
      max-width: 620px;
    }

    .source-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: var(--source-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: default;
    }

    .source-chip strong {
      color: #94a3b8;
      font-weight: 500;
    }

    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }

    .typing span {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }

    .empty-state svg {
      opacity: 0.3;
      margin-bottom: 4px;
    }

    .empty-state p { font-size: 15px; line-height: 1.5; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .suggestion {
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      color: #94a3b8;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .suggestion:hover { border-color: var(--accent); color: var(--text); }

    footer {
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      max-width: 780px;
      margin: 0 auto;
    }

    textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      padding: 11px 14px;
      resize: none;
      min-height: 44px;
      max-height: 160px;
      outline: none;
      transition: border-color 0.15s;
      overflow-y: auto;
    }

    textarea::placeholder { color: var(--text-muted); }
    textarea:focus { border-color: var(--accent); }

    button#send {
      width: 44px; height: 44px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }

    button#send:hover { background: #2563eb; }
    button#send:disabled { opacity: 0.4; cursor: not-allowed; }

    button#send svg { fill: white; }

    .error-bubble {
      padding: 10px 14px;
      background: #3b0f0f;
      border: 1px solid #7f1d1d;
      border-radius: 12px;
      font-size: 13px;
      color: #fca5a5;
    }

    @media (max-width: 480px) {
      #messages { padding: 16px 12px; }
      footer { padding: 10px 12px 14px; }
    }
  </style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>Veille Techno <span>— Second Cerveau</span></h1>
</header>

<div id="messages">
  <div class="empty-state" id="empty">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M12 2a10 10 0 1 1 0 20A10 10 0 0 1 12 2z"/>
      <path d="M12 8v4l3 3"/>
    </svg>
    <p>Interroge ta base de connaissances.<br/>Podcasts, analyses LLM, insights tech.</p>
    <div class="suggestions">
      <div class="suggestion" onclick="askSuggestion(this)">Agents IA autonomes</div>
      <div class="suggestion" onclick="askSuggestion(this)">Tendances SaaS 2026</div>
      <div class="suggestion" onclick="askSuggestion(this)">Product builder solo</div>
      <div class="suggestion" onclick="askSuggestion(this)">Automatisation no-code</div>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="input" placeholder="Pose une question…" rows="1"></textarea>
    <button id="send" title="Envoyer">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</footer>

<script>
  const API = 'https://veille-rag-701907145552.europe-west9.run.app/ask';

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const emptyEl = document.getElementById('empty');

  function askSuggestion(el) {
    inputEl.value = el.textContent;
    send();
  }

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);

  function appendMessage(role, content, sources) {
    if (emptyEl) emptyEl.style.display = 'none';

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;
    msg.appendChild(bubble);

    if (sources && sources.length > 0) {
      const sourcesEl = document.createElement('div');
      sourcesEl.className = 'sources';
      sources.forEach(s => {
        const chip = document.createElement('div');
        chip.className = 'source-chip';
        const date = s.date ? new Date(s.date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
        chip.innerHTML = `<strong>${s.source}</strong>${date ? ' · ' + date : ''}`;
        chip.title = s.title || '';
        sourcesEl.appendChild(chip);
      });
      msg.appendChild(sourcesEl);
    }

    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  function appendTyping() {
    if (emptyEl) emptyEl.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = 'message assistant';
    msg.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  function appendError(text) {
    const msg = document.createElement('div');
    msg.className = 'message assistant';
    const bubble = document.createElement('div');
    bubble.className = 'error-bubble';
    bubble.textContent = text;
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function send() {
    const question = inputEl.value.trim();
    if (!question) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', question);
    const typingMsg = appendTyping();

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });

      typingMsg.remove();

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();

      if (data.status === 'success' && data.answer) {
        appendMessage('assistant', data.answer.trim(), data.sources);
      } else {
        appendError('Aucune réponse trouvée dans la base.');
      }
    } catch (err) {
      typingMsg.remove();
      appendError(`Erreur : ${err.message}. Vérifie que l'API Cloud Run est active.`);
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>

</body>
</html>
